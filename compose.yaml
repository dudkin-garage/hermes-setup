services:
  hermes:
    container_name: hermes
    build:
      context: .
      dockerfile: containers/hermes/Dockerfile
      args:
        HERMES_IMAGE: ${HERMES_IMAGE:-nousresearch/hermes-agent:latest}
    image: ${HERMES_SETUP_IMAGE:-dudkin-garage/hermes-setup:local}
    restart: unless-stopped
    command: ${HERMES_COMMAND:-gateway run}
    shm_size: 1g
    ports:
      - "${HERMES_API_BIND_HOST:-127.0.0.1}:${HERMES_API_HOST_PORT:-8642}:${API_SERVER_PORT:-8642}"
      - "${HERMES_DASHBOARD_BIND_HOST:-127.0.0.1}:${HERMES_DASHBOARD_HOST_PORT:-9119}:${HERMES_DASHBOARD_PORT:-9119}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      OBSIDIAN_VAULTS_DIR: ${OBSIDIAN_VAULTS_CONTAINER_DIR:-/workspace/obsidian-vaults}
      NEUTTS_MODELS_DIR: ${NEUTTS_MODELS_CONTAINER_DIR:-/opt/models/neutts}
      HF_HOME: ${NEUTTS_MODELS_CONTAINER_DIR:-/opt/models/neutts}/huggingface
      HUGGINGFACE_HUB_CACHE: ${NEUTTS_MODELS_CONTAINER_DIR:-/opt/models/neutts}/huggingface/hub
      TORCH_HOME: ${NEUTTS_MODELS_CONTAINER_DIR:-/opt/models/neutts}/torch
    volumes:
      - ${HERMES_DATA_DIR:-${HOME}/.hermes}:/opt/data
      - ${OBSIDIAN_VAULTS_HOST_DIR:-${HOME}/obsidian-vaults}:${OBSIDIAN_VAULTS_CONTAINER_DIR:-/workspace/obsidian-vaults}
      - neutts-models:${NEUTTS_MODELS_CONTAINER_DIR:-/opt/models/neutts}
    stdin_open: true
    tty: true
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: hermes-cloudflared
    restart: unless-stopped
    depends_on:
      - hermes
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}

volumes:
  neutts-models:
    name: ${NEUTTS_MODELS_VOLUME:-hermes-neutts-models}
