# Hermes tunnel configuration
# Enables TCP forwarding and allows clients to specify the bind address for reverse tunnels.
# Use GatewayPorts clientspecified to allow binding to the Docker bridge IP (e.g., 172.17.0.1)
# without exposing the port to the public internet (unlike 0.0.0.0).

AllowTcpForwarding yes
GatewayPorts clientspecified
